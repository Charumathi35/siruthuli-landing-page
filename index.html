<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Inauguration | Siruthuli</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-container">
        <img src="Gemini_Generated_Image_fjctu3fjctu3fjct.png" alt="Grand Inauguration Background" id="bg-image">
        <div class="overlay"></div>
    </div>

    <main class="content">
        <div class="clock-decoration"></div>
        <div class="container fade-in">
            <div class="logo-container">
                <img src="logo.svg" alt="Siruthuli Logo" class="logo">
            </div>

            <header>
                <p class="pre-title">OUR NEW JOURNEY BEGINS</p>
                <h1 class="title">Grand Inauguration</h1>
                <p class="subtitle">Initialized by <br>
                    Sri N Vengatesh Prabhu, IFS, District Forest Officer - Coimbatore</p>
            </header>


            <div class="timer-section fade-in-delay">
                <div id="countdown" class="countdown">
                    <div class="time-block">
                        <span id="days">00</span>
                        <p>Days</p>
                    </div>
                    <div class="time-block">
                        <span id="hours">00</span>
                        <p>Hours</p>
                    </div>
                    <div class="time-block">
                        <span id="minutes">00</span>
                        <p>Minutes</p>
                    </div>
                    <div class="time-block">
                        <span id="seconds">00</span>
                        <p>Seconds</p>
                    </div>
                </div>
            </div>

            <div class="cta-section fade-in-delay-2">
                <a href="https://siruthuli.com/" class="btn-primary">
                    <span>Launch</span>
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
